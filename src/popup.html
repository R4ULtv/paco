<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paco</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>Paco</h1>
          <p class="subtitle">Keep YouTube repeats under control.</p>
        </div>
        <a
          class="brand-link"
          href="https://github.com/r4ultv/paco"
          target="_blank"
          rel="noreferrer"
          aria-label="Open Paco on GitHub"
        >
          <img class="brand-logo" src="./assets/paco-128.png" alt="Paco logo" />
        </a>
      </header>

      <section class="section section-compact">
        <div class="section-heading">
          <p class="label">Mode</p>
          <p class="hint" id="mode-description">Track repeated videos only.</p>
        </div>

        <div class="mode-picker" role="radiogroup" aria-label="Paco mode">
          <label class="mode-option">
            <input type="radio" name="mode" value="logs" />
            <span>Logs</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="block" />
            <span>Block</span>
          </label>
        </div>
      </section>

      <section class="section" id="block-threshold-section">
        <div class="threshold-header">
          <div>
            <p class="label">Threshold</p>
            <p class="hint">Hide videos when up too often.</p>
          </div>
          <strong class="threshold-value" id="block-threshold-value">10 videos</strong>
        </div>
        <input id="block-threshold" type="range" step="1" />
      </section>
    </main>

    <script src="./popup.js" type="module"></script>
  </body>
</html>
